name: Build WLED with RawPixelWS

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install -U platformio

      - name: Build firmware
        run: pio run -e esp32dev_rawws

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: wled-rawws-esp32dev
          path: .pio/build/esp32dev_rawws/firmware.bin
